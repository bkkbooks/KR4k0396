body:
  text: 蕭廣濟孝子傳蕭廣濟孝子傳閔損與曾參門徒之中最有孝稱今言者莫不本之曾閔初學記十七杜孝巴郡人也少失父與母居至孝充役在成都母喜食生魚孝於蜀截大竹筒盛魚二頭塞之以草祝曰我母必得此因投中流婦出渚乃見筒橫來觸岸異而取視有二魚含笑曰必我壻所寄熟而進之聞者歎駭御覽四百十一藝文類聚九十九初學記十七隗通字君相母好飲江水嘗乘舟楫致之漂浚艱辛忽有橫石特起直麴江眷後取水無復勞劇御覽同上辛繕字幼文母喪精廬旁有大鳥頭高五尺雞首燕領魚尾蛇頸備五色而青棲於門樹御覽同上施延字君子少盡色養之道赤眉之際將母到吳郡海鹽賃為半路亭卒每取月直以供養督郵馮敷知其賢與飲食論道餉錢並不受御覽四百十四王驚盧陵石陽人父喪未葬假瘞宅後野火熛燎驚力不能救投火而死御覽七百六十六媯皓字元起吳郡餘杭人父昆南郡太守以事被劾皓年十六髡頭詣闕通章不省皓不飲食懷石腰中但詣公卿門及行路時輒出石置地叩頭流血覆面莫不傷懷遂奏理昆罪御覽同上藝文類聚三十伏恭字叔齊琅邪東武人也伯父大司空湛孝謹敦睦世號伏不鬭恭事後母著孝建武初纍遷太僕上臨辟雍於萬人中拜司空衆以恭孝行故光之御覽同上蕭芝忠孝除尚書郎有雉數十頭飲啄宿止當上直送至歧路下直及門飛鳴車側御覽九百十七藝文類聚九十邢渠失母與父仲居性至孝貧無子傭以給父父老齒落不能食渠嘗自哺之專專然代其喘息仲遂康休齒落更生百餘歲乃卒也御覽同上伍襲字世公丁父憂廬墓側有一鹿每襲哭輒踞墳而悲御覽九百六巴郡文讓養母至孝母死不用僮僕之力兄弟二人營築其墳墳土未足耕一畝地為壤暫歸取糧群鳥數千銜所作壤以著墳上俄而成墳御覽三十七四百十一申屠勳字君遊河內汲人少失父與母孤貧傭作供養夏天多蚊子臥母床下以身遮之御覽四百十三申屠勳字君遊少失父與母居家貧傭力供養作壽器用漆三斛十年乃成御覽七百六十六宿倉舒陳留尉氏人也年七歲遭荒父母飢苦倉舒求自賣與潁川王氏得大麥九斛後王氏免之纍官除上黨太守後尋覔父母經太原南郭忽見母遂還舊居母卒悲號而死御覽同上王修字叔治北海人年七歲喪母母以社日亡來年社日修哀感悲號鄰人為之罷社御覽五百六十三王祥後母病欲得黃雀炙祥思念卒難致須臾忽有數十黃雀飛入其幕御覽九百二十二藝文類聚九十二書鈔炙部王祥後母庭有奈樹始著子使守視祥晝驅鳥雀夜則驚鼠時雨忽至祥抱樹至曙母見惻然御覽九百七十桑虞字子綱魏郡黎陽人晉黃門郎沖之子喪父虞年十四毀瘠過禮日食百粒以糝藜霍御覽七百六十六郭世道會稽永興人年十四喪父事後母勤身供養婦生男夫婦共議養此兒所廢者大乃瘞之母亡服竟追思未嘗釋衣御覽同上郭原平墓下有數十畝田不屬原平每至農月耕者恆裸袒原平不欲使慢其墳墓乃歸賣家資買此田三農之月輒束帶垂泣躬自耕墾之御覽八百二十一何子平盧江灊人事母至孝為揚州從事月俸得白米輒貨市粟麥人或問之答曰尊老不辨常得米生何容得食白粲有贈鮭者不可寄家則不肯受母喪年將六十有孺子之慕宋大明末飢荒八年不得營葬晝夜號叫居屋不蔽雨日兄子伯與為葺治子平曰我情事未申天地一罪人屋何宜覆御覽七百六十六朱百年會稽山陰人家貧母以冬月亡無絮自此不衣綿帛與同郡孔凱善時寒月就孔宿飲酒醉眠孔以臥具覆之百年覺引去謂孔曰綿定奇溫因流涕悲痛御覽同上陳元字子元陳侯太子七歲喪母父更娶周氏有子曰昭周氏讒元侯將殺元昭欲先死元不聽引白羊誓曰孝者羊血逆上一丈三尺一如誓後又讒之侯怒令元自殺元投遼水有大魚負之元曰我罪人也魚乃去昭從後來問漁者云投水死矣昭氣絶良久曰吾兄也又投水而死御覽四百十六鄧展父母狂牖下臥多蚊展伏床下以自當之御覽九百四十五展勤少失父與母居傭作供養天多蚊臥母床下以身當之藝文類聚九十七蕭國遭喪有鵠遊其庭至暮而去麞暮入其門與馬犬侶至旦而去御覽九百七藝文類聚九十五殷惲殷惲生而謹願七歲喪父哀號毀悴不為戲弄得瓜果可啖之物懷持進母未嘗先食初學記十七杜牙至孝母卒傭力營墳結茅墓側牙病嘗有一鹿銜哺之及牙卒乃掘地埋之白帖鹿三洲三洲者人各一洲人皆孤單煢獨三人暗會樹下息因相訪問老者曰寧可合為斷金之業耶二人曰諾即相約為父子因命二人於大澤中作舍且欲成父曰比不如河邊二人曰諾河邊舍幾成父曰又不如河中二人復填河二旬不立有一書生過之為縛兩土肫投河中會父往呼止之曰嘗見河可填耶觀汝行耳相將而去明日俱至河邊望見河中土高丈餘御覽六十一魏陽不知何處人獨與父居父有刀戟市南少年求之陽曰老父所服不敢相許少年怒道逢陽父打陽叩頭請罪父沒陽斷少年頭以謝父冢前御覽三百五十二五郡孝子者中山常山魏郡巨鹿趙國人也少去鄉里孤無父母相隨於衛國因結兄弟長元重次仲重次叔重次季重次稚重朝夕相事財三千萬於空城中見一老姥兄弟下車再拜曰願為母母許焉積二十四年母得病口不能言五子乃仰天歎願使我母語即便得語謂五子曰吾太原董陽猛女嫁同郡張文賢死亡我男兒名馬遺七歲值亂亡失心前有七星右足有黑識語未竟而卒五子送喪會朝歌長晨出亡其記囊疑五子所竊收得三重詣河內告枉具言始末太守號哭曰生不識父與母相失痛不自聊知近為五子所養馳使放三重御覽三百七十二
